# Hermes Agent — configuração para eu_digital (Railway)
# Referência: cli-config.yaml.example do repo NousResearch/hermes-agent

model:
  # OpenAI direto — base_url obrigatório porque o default do Hermes é OpenRouter.
  default: "${MODEL:-gpt-4.1-mini}"
  base_url: "https://api.openai.com/v1"
  provider: "auto"

execution:
  environment: "local"
  max_iterations: 3

tools:
  enabled:
    - web                           # web_search, firecrawl
    - file                          # leitura/escrita de arquivos
    - memory                        # skills + MEMORY.md
    - browser                       # Steel Browser (Railway interno)
  disabled:
    - terminal                      # segurança: sem execução de shell

memory:
  persistent: true
  max_chars: 8000                   # limite do MEMORY.md
  nudge_interval: 5                 # a cada 5 ciclos, o agente atualiza a memória

context:
  compression: true                 # comprime contexto longo automaticamente
  compression_model: "gpt-4.1-mini"  # modelo leve para compressão de contexto

agent:
  max_iterations: 3
  reasoning_effort: "medium"
  soul_file: "SOUL.md"             # personalidade/identidade do agente

logging:
  save_sessions: true
  log_level: "info"
